<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/login.css">

<body>

  <!-- LOGIN PAGE -->

  <section id="loginPage">

    <div class="login-box">

      <h1>Welcome</h1>

      <p>Enter Secret Key</p>

      <input type="password" id="password" placeholder="Enter Key">

      <button onclick="checkPassword()">
        Open Profile
      </button>

      <div id="error">
        Invalid Key!
      </div>

    </div>

  </section>

  <!-- MAIN WEBSITE -->


  <section id="mainWebsite">
<div id="google_translate_element" class="tra-1"></div>


    <div id="header"></div>
<button class="lang-btn" onclick="toggleLanguage()">
    🌐 English / తెలుగు
</button>
    <div class="container">

      <div id="about"></div>

      <div id="personal"></div>

      <div id="education"></div>

      <div id="family"></div>

      <div id="gallery"></div>

      <div id="contact"></div>

    </div>

    <div id="footer"></div>

  </section>

  <script src="js/app.js"></script>

 <script>
function googleTranslateElementInit() {
    new google.translate.TranslateElement(
        {
            pageLanguage: 'en',
            includedLanguages: 'en,te',

        },

    );
}
